name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
      - name: Run Go tests
        run: go test ./...

  frontend-quality:
    name: Frontend type/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
