services:
  skylink:
    build: .
    ports:
      - "18080:18080"  # 反代端口（樱花 frp 转发到此）
      - "19080:19080"  # 管理 API + GUI
    volumes:
      - ./data:/data
    environment:
      - SKYLINK_PROXY_PORT=18080
      - SKYLINK_ADMIN_PORT=19080
      - SKYLINK_DB_PATH=/data/skylink.db
      # 可选：CF_API_TOKEN、CF_ZONE_ID
    restart: unless-stopped
    networks:
      - skylink

  # EasyTier mesh VPN：与 SkyLink 同网段，由 SkyLink UI 配置并写入 ./data/easytier.env
  easytier:
    image: easytier/easytier:${EASYTIER_IMAGE_TAG:-latest}
    env_file:
      - ./data/easytier.env
    environment:
      - ET_RPC_PORTAL=0.0.0.0:15888
    privileged: true
    restart: unless-stopped
    networks:
      - skylink

networks:
  skylink:
    driver: bridge
